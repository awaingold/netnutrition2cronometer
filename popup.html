<!DOCTYPE html>
<head>
    <style>
        .outer {
            text-align: center;
            font-family: arial;
            align-items:center;
        }
        #title {
            color: purple;
        }
        #importButton {
            background-color: orange;
            border-radius: 10%;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const importButton = document.getElementById("importButton");
            importButton.addEventListener( "click", () => {
                chrome.runtime.sendMessage({ type: 'START_IMPORT' });
            });
        });
    </script>
</head>
<body>
    <div class = "outer">
        <h3 id = "title">NetNutrition2Cronometer</h3>
        <button id = "importButton"><strong>Import Nutrition</strong></button>
    </div>
</body>
